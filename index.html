<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Cairo:wght@400;700;900&display=swap');

        :root {
            --pure-ice: rgba(255, 255, 255, 0.12); 
            --bright-gold: #efd88b; 
            --gold-gradient: linear-gradient(90deg, transparent, #ffffff, transparent);
            --main-text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        body {
            background: url('bk2.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            overflow: hidden;
            position: relative;
        }

        .snowflake {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.6;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10vh); }
            100% { transform: translateY(110vh); }
        }

        .card-wrapper {
            position: relative;
            width: 100%;
            max-width: px;
            padding: 3px;
            background: linear-gradient(90deg, #ffffff, #000000, #000000);
            background-size: 0% auto;
            border-radius: 35px;
            animation: borderShine 4s linear infinite;
            z-index: 10;
        }

        @keyframes borderShine {
            to { background-position: 200% center; }
        }

        /* 🔥 التعديل هنا فقط */
        .glass-card {
            background: rgba(255, 255, 255, 0.08); /* شفافية خفيفة عشان يظهر البلور */
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);

            border-radius: 32px;
            padding: 40px 25px;
            text-align: center;
            width: 100%;
        }

        .profile-img {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 2px solid var(--bright-gold);
            margin: 0 auto 15px;
            display: block;
            object-fit: cover;
        }

        h1 {
            font-family: 'Aref Ruqaa', serif;
            font-size: 3.5rem;
            background: linear-gradient(90deg, #c5a059, #f1d592, #c5a059);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: borderShine 3s linear infinite;
            margin-bottom: 5px;
        }

        .bio-info h2 {
            font-size: 1.1rem;
            color: var(--bright-gold);
            font-weight: 800;
        }

        .bio-info p {
            font-size: 0.9rem;
            color: #ccc;
            margin-bottom: 25px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .link-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(241, 213, 146, 0.3);
            border-radius: 15px;
            padding: 14px 20px;
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 700;
        }

        .link-btn:hover {
            background: rgba(241, 213, 146, 0.1);
            transform: scale(1.02);
            border-color: var(--bright-gold);
        }

        .link-btn i {
            font-size: 1.3rem;
            color: var(--bright-gold);
        }

        .store-section {
            border-top: 1px solid rgba(241, 213, 146, 0.2);
            padding-top: 20px;
        }

        .store-btn {
            background: linear-gradient(45deg, #c5a059, #f1d592);
            color: #000;
            padding: 12px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 10px;
            color: var(--bright-gold);
            opacity: 0.7;
        }

        @media (max-width: 480px) {
            .card-wrapper { max-width: 95%; }
            h1 { font-size: 2.8rem !important; }
        }
    </style>
</head>
<body>

<script>
function createSnow() {
    const snow = document.createElement('div');
    snow.classList.add('snowflake');
    snow.style.left = Math.random() * 100 + 'vw';
    snow.style.opacity = Math.random();
    snow.style.width = snow.style.height = Math.random() * 4 + 2 + 'px';
    snow.style.animationDuration = Math.random() * 3 + 5 + 's';
    document.body.appendChild(snow);
    setTimeout(() => snow.remove(), 8000);
}
setInterval(createSnow, 200);
</script>

<div class="card-wrapper">
    <div class="glass-card">
        <img src="arth.png" class="profile-img">

        <h1>ARTH</h1>
        
        <div class="bio-info">
            <h2>من هو أرث؟</h2>
            <p>مطور وصانع محتوى لينكس</p>
        </div>

        <div class="links-container">
            <a href="#" class="link-btn">
               ARTH-PROJECT قيد الصيانه           
                <i class="fas fa-crown"></i>
            </a>

            <a href="https://youtube.com/@arth-youtube?si=_ardNkbXDr6yCFnJ" class="link-btn" target="_blank">
                <span>يوتيوب | YouTube</span>
                <i class="fab fa-youtube"></i>
            </a>
            
            <a href="https://www.tiktok.com/@_l6t2?_r=1&_t=ZS-95WcKz5a3Uq" class="link-btn" target="_blank">
                <span>تيك توك | TikTok</span>
                <i class="fab fa-tiktok"></i>
            </a>
            
            <a href="https://discord.gg/EgS5tasD2" class="link-btn" target="_blank">
                <span>ديسكورد | Discord</span>
                <i class="fab fa-discord"></i>
            </a>
        </div>

        <div class="store-section">
            <a href="#" class="store-btn">
المتجر قيد الصيانه ) :
            </a>
        </div>

        <div class="footer-text">
            
        </div>
    </div>
</div>

</body>
</html>
