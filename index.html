<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ARTH | Compact Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Aref+Ruqaa:wght@700&family=Cairo:wght@400;700;900&display=swap');

        :root {
            --bright-gold: #f1d592;
            --gold-gradient: linear-gradient(90deg, #c5a059, #f1d592, #c5a059);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background: url('bk2.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Cairo', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .snowflake {
            position: fixed;
            background: #fff;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.5;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0%   { transform: translateY(-10vh) translateX(0); }
            50%  { transform: translateY(55vh) translateX(8px); }
            100% { transform: translateY(110vh) translateX(0); }
        }

        .card-wrapper {
            position: relative;
            width: 100%;
            max-width: 380px;
            padding: 2.5px;
            background: var(--gold-gradient);
            background-size: 0% auto;
            border-radius: 32px;
            animation: borderShine 4s linear infinite;
            z-index: 10;
            box-shadow: 0 0 25px rgba(197, 160, 89, 0.3), 0 8px 32px rgba(0,0,0,0.35);
        }

        @keyframes borderShine {
            to { background-position: 200% center; }
        }

        .glass-card {
            position: relative;
            background: transparent;
            backdrop-filter: blur(28px) saturate(180%);
            -webkit-backdrop-filter: blur(28px) saturate(180%);
            border-radius: 30px;
            padding: 28px 22px 22px;
            text-align: center;
            width: 100%;
            overflow: hidden;
        }

        .profile-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 2.5px solid var(--bright-gold);
            margin: 0 auto 12px;
            display: block;
            object-fit: cover;
            position: relative;
            z-index: 2;
            box-shadow: 0 0 15px rgba(241,213,146,0.2), 0 4px 16px rgba(0,0,0,0.4);
        }

        h1 {
            font-family: 'Aref Ruqaa', serif;
            font-size: clamp(2.2rem, 8vw, 2.8rem);
            background: var(--gold-gradient);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: textShine 3s linear infinite;
            margin-bottom: 2px;
            position: relative;
            z-index: 2;
        }

        @keyframes textShine {
            to { background-position: 200% center; }
        }

        .bio-info {
            position: relative;
            z-index: 2;
        }

        .bio-info h2 {
            font-size: clamp(0.9rem, 3.5vw, 1.05rem);
            color: var(--bright-gold);
            font-weight: 800;
            letter-spacing: 0.04em;
        }

        .bio-info p {
            font-size: clamp(0.75rem, 3vw, 0.82rem);
            color: rgba(255,255,255,0.88);
            font-weight: 600;
            margin-bottom: 16px;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 15px;
            position: relative;
            z-index: 2;
        }

        .link-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(241, 213, 146, 0.3);
            border-radius: 14px;
            padding: 12px 16px;
            text-decoration: none;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 700;
            font-size: clamp(0.85rem, 3.2vw, 0.95rem);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .link-btn:active,
        .link-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--bright-gold);
            transform: scale(1.04);
            box-shadow: 0 5px 15px rgba(241, 213, 146, 0.1);
        }

        .link-btn i {
            font-size: 1.2rem;
            color: var(--bright-gold);
            flex-shrink: 0;
        }

        .store-section {
            border-top: 1px solid rgba(241, 213, 146, 0.2);
            padding-top: 15px;
            position: relative;
            z-index: 2;
        }

        .store-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--bright-gold);
            color: var(--bright-gold);
            padding: 9px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 900;
            font-size: clamp(0.75rem, 2.8vw, 0.85rem);
            display: inline-flex;
            align-items: center;
            gap: 7px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .footer-text {
            margin-top: 12px;
            font-size: 9px;
            color: var(--bright-gold);
            opacity: 0.8;
            letter-spacing: 0.08em;
            position: relative;
            z-index: 2;
        }

        @media (max-width: 400px) {
            body { padding: 12px; }
            .card-wrapper { max-width: 100%; width: 94%; border-radius: 28px; }
            .glass-card { padding: 22px 16px 18px; border-radius: 26px; }
            .profile-img { width: 75px; height: 75px; }
        }

        @media (max-height: 680px) {
            .glass-card { padding: 18px 18px 16px; }
            .links-container { gap: 8px; margin-bottom: 12px; }
            .link-btn { padding: 10px 14px; }
            .bio-info p { margin-bottom: 12px; }
        }
    </style>
</head>
<body>

    <script>
        function createSnow() {
            const snow = document.createElement('div');
            snow.classList.add('snowflake');
            snow.style.left = Math.random() * 100 + 'vw';
            snow.style.opacity = Math.random() * 0.5 + 0.2;
            const size = Math.random() * 3 + 2;
            snow.style.width = size + 'px';
            snow.style.height = size + 'px';
            snow.style.animationDuration = Math.random() * 4 + 5 + 's';
            document.body.appendChild(snow);
            setTimeout(() => snow.remove(), 9000);
        }
        setInterval(createSnow, 280);
    </script>

    <div class="card-wrapper">
        <div class="glass-card">
            <img src="arth.png" alt="Profile" class="profile-img">

            <h1>ARTH</h1>

            <div class="bio-info">
                <h2>ARTH-PROJECT</h2>
                <p>مطور وصانع محتوى لينكس</p>
            </div>

            <div class="links-container">
                <a href="https://youtube.com/@arth-youtube?si=_ardNkbXDr6yCFnJ" class="link-btn" target="_blank">
                    <span>يوتيوب | YouTube</span>
                    <i class="fab fa-youtube"></i>
                </a>
                <a href="https://www.tiktok.com/@_l6t2?_r=1&_t=ZS-95WcKz5a3Uq" class="link-btn" target="_blank">
                    <span>تيك توك | TikTok</span>
                    <i class="fab fa-tiktok"></i>
                </a>
                <a href="https://discord.gg/EgS5tasD2" class="link-btn" target="_blank">
                    <span>ديسكورد | Discord</span>
                    <i class="fab fa-discord"></i>
                </a>
            </div>

            <div class="store-section">
                <div class="store-btn">
                    المتجر قيد الصيانة <i class="fas fa-tools"></i>
                </div>
            </div>

            <div class="footer-text">ARTH SYSTEM © 2026</div>
        </div>
    </div>

</body>
</html>
